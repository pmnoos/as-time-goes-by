{% extends "base.html" %}
{% block title %}New Post — My Blog{% endblock %}

{% block content %}
<div class="form-page">
    <h1>New Post</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="POST" action="/posts/new" enctype="multipart/form-data" id="post-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required placeholder="Your post title">
        </div>

        <div class="form-group">
            <label>Content</label>
            <div id="quill-editor"></div>
            <input type="hidden" name="body" id="body">
        </div>


        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                {% for value, label in CATEGORIES %}
                <option value="{{ value }}" {% if value == 'community-life' %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="tags">Tags <span class="hint">(comma separated)</span></label>
            <input type="text" id="tags" name="tags" placeholder="python, fastapi, web">
        </div>


        <div class="form-group">
            <label for="cover_image">Cover image <span class="hint">(optional)</span></label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*">
        </div>
        <div class="form-group">
            <label for="cover_caption">Image caption <span class="hint">(optional)</span></label>
            <input type="text" id="cover_caption" name="cover_caption" maxlength="300" placeholder="Write a caption for your image (optional)">
        </div>

        <button type="submit" class="btn">Publish post</button>
    </form>
</div>

<!-- Quill Editor (stable features only) -->
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: 'Write your post here...',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['blockquote', 'code-block'],
                ['link', 'image', 'video'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                ['clean']
            ]
        }
    });

    document.getElementById('post-form').addEventListener('submit', function(e) {
        document.getElementById('body').value = quill.root.innerHTML;
    });
});
</script>
{% endblock %}
