{% extends "base.html" %}
{% block title %}Edit Post — My Blog{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Edit Post</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="POST" action="/posts/{{ post.slug }}/edit" enctype="multipart/form-data" id="post-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required value="{{ post.title }}">
        </div>

        <div class="form-group">
            <label>Content</label>
            <div id="quill-editor"></div>
            <input type="hidden" name="body" id="body">
        </div>


        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                {% for value, label in CATEGORIES %}
                <option value="{{ value }}" {% if value == post.category %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="tags">Tags <span class="hint">(comma separated)</span></label>
            <input type="text" id="tags" name="tags"
                   value="{{ post.tags | map(attribute='name') | join(', ') }}">
        </div>


        <div class="form-group">
            <label for="cover_image">Cover image <span class="hint">(optional d upload to replace)</span></label>
            {% if post.cover_image %}
            <img src="{{ post.cover_image }}" alt="Current cover" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:0.5rem">
            {% endif %}
            <input type="file" id="cover_image" name="cover_image" accept="image/*">
        </div>
        <div class="form-group">
            <label for="cover_caption">Image caption <span class="hint">(optional)</span></label>
            <input type="text" id="cover_caption" name="cover_caption" maxlength="300" value="{{ post.cover_caption or '' }}" placeholder="Write a caption for your image (optional)">
        </div>

       <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem">
    <div style="display:flex;gap:1rem">
        <button type="submit" class="btn">Save changes</button>
        <a href="/posts/{{ post.slug }}" class="btn btn-outline">Cancel</a>
    </div>

    <form method="POST" action="/posts/{{ post.slug }}/delete"
          onsubmit="return confirm('Are you sure you want to delete this post? This cannot be undone.')">
        <button type="submit" class="btn btn-danger">Delete post</button>
    </form>
</div>
    </form>
</div>

<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const quill = new Quill('#quill-editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['blockquote', 'code-block'],
                ['link', 'image', 'video'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                ['clean']
            ]
        }
    });

    // Pre-populate with existing content
    quill.root.innerHTML = {{ post.body | tojson }};

    document.getElementById('post-form').addEventListener('submit', function(e) {
        document.getElementById('body').value = quill.root.innerHTML;
    });
});
</script>
{% endblock %}
